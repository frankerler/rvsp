<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design & AI — Events</title>
  <style>
    @font-face { font-family: 'Archivo'; src: url('/fonts/Archivo-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Archivo'; src: url('/fonts/Archivo-Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Archivo'; src: url('/fonts/Archivo-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Archivo'; src: url('/fonts/Archivo-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 48px;
      border-bottom: 1px solid #eae8e4;
    }
    .nav-logo {
      font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .nav-right {
      font-size: 13px; color: #999; font-weight: 400;
    }

    .page {
      max-width: 800px; margin: 0 auto;
      padding: 80px 48px 120px;
    }

    .page-title {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.05; margin-bottom: 12px;
    }

    .page-sub {
      font-size: 17px; color: #888;
      margin-bottom: 64px; font-weight: 400;
    }

    .events-list { display: flex; flex-direction: column; gap: 0; }

    .event-card {
      display: grid; grid-template-columns: 1fr auto;
      gap: 32px; align-items: center;
      padding: 36px 0;
      border-top: 1px solid #eae8e4;
      text-decoration: none; color: inherit;
      transition: opacity 0.2s;
    }

    .event-card:last-child { border-bottom: 1px solid #eae8e4; }
    .event-card:hover { opacity: 0.65; }

    .event-card-title {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 8px;
      line-height: 1.3;
    }

    .event-card-meta {
      display: flex; gap: 24px; flex-wrap: wrap;
    }

    .event-card-meta span {
      font-size: 14px; color: #999;
    }

    .event-card-right { text-align: right; }

    .event-spots {
      font-size: 36px; font-weight: 700; letter-spacing: -0.03em;
      color: #1a1a1a;
    }

    .event-spots-label {
      font-size: 12px; color: #bbb; margin-top: 2px;
    }

    .event-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 4px 12px; border-radius: 100px; margin-top: 10px;
    }

    .badge-free {
      background: #1a1a1a; color: #faf9f7;
    }

    .badge-full {
      background: #e8e6e2; color: #999;
    }

    .empty-state {
      text-align: center; padding: 80px 20px;
      color: #ccc; font-size: 16px;
    }

    footer {
      text-align: center; padding: 40px 48px;
      font-size: 12px; color: #ccc;
      border-top: 1px solid #eae8e4;
    }

    @media (max-width: 640px) {
      nav, .page { padding-left: 24px; padding-right: 24px; }
      .event-card { grid-template-columns: 1fr; gap: 16px; }
      .event-card-right { text-align: left; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo" id="navLogo">Design & AI</div>
    <div class="nav-right">Events</div>
  </nav>

  <div class="page">
    <h1 class="page-title" id="pageTitle">Upcoming<br>Events</h1>
    <p class="page-sub" id="pageSub">Find an event, reserve your spot.</p>
    <div class="events-list" id="eventsList">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <footer id="footerText">Design & AI</footer>

  <script>
    async function loadSettings() {
      try {
        const res = await fetch("/api/settings");
        const s = await res.json();
        if (s.site_title) {
          document.getElementById("navLogo").textContent = s.site_title;
          document.getElementById("footerText").textContent = s.site_title;
          document.title = s.site_title + " — Events";
        }
        if (s.page_title) {
          document.getElementById("pageTitle").innerHTML = s.page_title.replace(/\n/g, "<br>");
        }
        if (s.page_subtitle) {
          document.getElementById("pageSub").textContent = s.page_subtitle;
        }
      } catch {}
    }
    loadSettings();

    async function loadEvents() {
      const container = document.getElementById("eventsList");
      try {
        const res = await fetch("/api/events");
        const events = await res.json();
        if (!events.length) {
          container.innerHTML = '<div class="empty-state">No upcoming events yet.</div>';
          return;
        }
        container.innerHTML = events.map(e => {
          const title = e.title.replace(/\n/g, " ");
          const full = e.available <= 0;
          return `
            <a href="/event/${e.slug}" class="event-card">
              <div>
                <div class="event-card-title">${esc(title)}</div>
                <div class="event-card-meta">
                  <span>${esc(e.event_date)}</span>
                  <span>${esc(e.event_time)}</span>
                  <span>${esc(e.location_name)}</span>
                </div>
              </div>
              <div class="event-card-right">
                <div class="event-spots">${e.available}</div>
                <div class="event-spots-label">spots left</div>
                ${full ? '<span class="event-badge badge-full">Full</span>' :
                  e.price.toLowerCase() === 'free' ? '<span class="event-badge badge-free">Free</span>' : ''}
              </div>
            </a>`;
        }).join("");
      } catch {
        container.innerHTML = '<div class="empty-state">Failed to load events.</div>';
      }
    }
    function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
    loadEvents();
  </script>
</body>
</html>
